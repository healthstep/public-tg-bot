name: Docker Image CI

on:
  push:
    branches: ["main", "*"]
  pull_request:
    branches: ["main"]

jobs:
  build:
    if: github.ref != 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: public-tg-bot
      - uses: actions/checkout@v4
        with:
          repository: healthstep/core-users
          token: ${{ secrets.GOD_TOKEN }}
          path: core-users
      - uses: actions/checkout@v4
        with:
          repository: healthstep/core-health
          token: ${{ secrets.GOD_TOKEN }}
          path: core-health
      - name: Build the Docker image
        run: docker build . --file public-tg-bot/Dockerfile --tag ${{ secrets.DOCKER_USER }}/public-tg-bot:${{ github.sha }}

  build-and-update:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: public-tg-bot
      - uses: actions/checkout@v4
        with:
          repository: healthstep/core-users
          token: ${{ secrets.GOD_TOKEN }}
          path: core-users
      - uses: actions/checkout@v4
        with:
          repository: healthstep/core-health
          token: ${{ secrets.GOD_TOKEN }}
          path: core-health
      - name: Docker login
        run: docker login -u ${{ secrets.DOCKER_USER }} -p ${{ secrets.DOCKER_PASSWORD }}
      - name: Build the Docker image
        run: docker build . --file public-tg-bot/Dockerfile --tag ${{ secrets.DOCKER_USER }}/public-tg-bot:${{ github.sha }}
      - name: Docker Push
        run: |
          docker push ${{ secrets.DOCKER_USER }}/public-tg-bot:${{ github.sha }}
          docker tag ${{ secrets.DOCKER_USER }}/public-tg-bot:${{ github.sha }} ${{ secrets.DOCKER_USER }}/public-tg-bot:latest
          docker push ${{ secrets.DOCKER_USER }}/public-tg-bot:latest

  deploy:
    if: github.ref == 'refs/heads/main'
    needs: build-and-update
    runs-on: ubuntu-latest
    steps:
      - name: SSH to Server
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USERNAME }}
          password: ${{ secrets.SERVER_PASSWORD }}
          script: |
            cd /root/healthstep/infra
            docker compose pull public-tg-bot
            docker compose up -d public-tg-bot
